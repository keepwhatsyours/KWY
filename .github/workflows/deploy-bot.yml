name: deploy bot to render

on:
  push:
    branches: [main]
    paths:
      - 'bot/**'
      - 'Dockerfile'
      - '.github/workflows/deploy-bot.yml'
  workflow_dispatch:

# only one deploy at a time — queue but don't cancel in-flight deploys
concurrency:
  group: deploy-bot
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Render deploy hook
        run: curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" || true
